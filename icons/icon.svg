<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="100" fill="#07070f"/>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e0e1c"/>
      <stop offset="100%" style="stop-color:#14142a"/>
    </linearGradient>
    <linearGradient id="pg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#e040a8"/>
    </linearGradient>
  </defs>
  <!-- Chart bars -->
  <rect x="100" y="320" width="50" height="100" rx="6" fill="rgba(255,255,255,0.15)"/>
  <rect x="170" y="260" width="50" height="160" rx="6" fill="rgba(255,255,255,0.15)"/>
  <rect x="240" y="200" width="50" height="220" rx="6" fill="url(#pg)"/>
  <rect x="310" y="240" width="50" height="180" rx="6" fill="rgba(255,255,255,0.15)"/>
  <rect x="380" y="160" width="50" height="260" rx="6" fill="url(#pg)" opacity="0.8"/>
  <!-- Trend line -->
  <polyline points="125,300 195,240 265,180 335,220 405,140"
    fill="none" stroke="#e040a8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Dot at peak -->
  <circle cx="405" cy="140" r="12" fill="#e040a8"/>
</svg>
